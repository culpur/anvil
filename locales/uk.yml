cmd.iac.usage: |
  Використання:
    /iac plan       Запустити terraform/tofu plan
    /iac apply      Запустити terraform/tofu apply
    /iac validate   Перевірити файли конфігурації
    /iac drift      Виявити drift інфраструктури (plan -refresh-only)
cmd.iac.tui_modal_required: "/iac apply: модальне вікно підтвердження в TUI не розв'язалося. Спробуйте ще раз — або запустіть `anvil --print /iac apply` зі звичайної оболонки, щоб скористатися підтвердженням CLI."
