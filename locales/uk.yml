# ─── Команди — voice / collab / docker / k8s / iac / deps ─────────────────
cmd.docker.usage: |
  Використання:
    /docker ps                   Перелічити запущені контейнери
    /docker logs <container>     Показати останні 50 рядків логів контейнера
    /docker compose              Показати сервіси docker-compose (якщо є)
    /docker build                Зібрати image з Dockerfile у поточній директорії
cmd.docker.logs_usage: "Використання: /docker logs <container>"
cmd.docker.unknown_sub: "Невідома підкоманда docker: %{sub}\nЗапустіть `/docker help` для довідки."

cmd.voice.start: |
  Голосове введення — скоро

  Захоплення голосу потребує доступу до мікрофона та backend speech-to-text.
  Заплановано: /voice start  ->  захопити вхід з мікрофона та вставити як prompt.
cmd.voice.stop: |
  Голосове введення — скоро

  Немає активної голосової сесії для зупинки.
cmd.voice.help: |
  Голосове введення (скоро)

  Команди:
    /voice start   Почати захоплення введення з мікрофона
    /voice stop    Зупинити захоплення та надіслати

  Потребує локального двигуна speech-to-text (напр. whisper.cpp).
cmd.voice.unknown_sub: "Невідома підкоманда /voice: %{sub}\n  /voice start | /voice stop"

cmd.collab.share: |
  Співпраця — скоро

  Заплановано: /collab share  ->  згенерувати ID сесії, яким можна поділитися.
  Цю функцію зарезервовано для майбутньої версії.
cmd.collab.join: |
  Співпраця — скоро

  Використання: /collab join <session-id>
  Цю функцію зарезервовано для майбутньої версії.
cmd.collab.help: |
  Співпраця (скоро)

  Команди:
    /collab share          Поділитися цією сесією (генерує ID запрошення)
    /collab join <id>      Приєднатися до спільної сесії іншого користувача

  Потребує облікового запису AnvilHub. Стежте за changelog щодо доступності.
cmd.collab.unknown_sub: "Невідома підкоманда /collab: %{sub}\n  /collab share | /collab join <id>"

