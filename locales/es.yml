cmd.docker.usage: |
  Uso:
    /docker ps                   Listar contenedores en ejecución
    /docker logs <contenedor>    Mostrar las últimas 50 líneas de logs del contenedor
    /docker compose              Mostrar servicios de docker-compose (si existen)
    /docker build                Construir imagen desde el Dockerfile del directorio actual
cmd.docker.logs_usage: "Uso: /docker logs <contenedor>"
cmd.docker.unknown_sub: "Sub-comando docker desconocido: %{sub}\nEjecuta `/docker help` para ver el uso."

cmd.voice.start: |
  Entrada de voz — próximamente

  La captura de voz requiere acceso al micrófono y un backend de voz a texto.
  Previsto: /voice start  ->  capturar la entrada del micrófono e inyectarla como prompt.
cmd.voice.stop: |
  Entrada de voz — próximamente

  No hay una sesión de voz activa que detener.
cmd.voice.help: |
  Entrada de voz (próximamente)

  Comandos:
    /voice start   Iniciar la captura del micrófono
    /voice stop    Detener la captura y enviar

  Requiere un motor local de voz a texto (p. ej., whisper.cpp).
cmd.voice.unknown_sub: "Sub-comando /voice desconocido: %{sub}\n  /voice start | /voice stop"

cmd.collab.share: |
  Colaboración — próximamente

  Previsto: /collab share  ->  generar un ID de sesión compartible.
  Esta función queda reservada para una versión futura.
cmd.collab.join: |
  Colaboración — próximamente

  Uso: /collab join <session-id>
  Esta función queda reservada para una versión futura.
cmd.collab.help: |
  Colaboración (próximamente)

  Comandos:
    /collab share          Compartir esta sesión (genera un ID de invitación)
    /collab join <id>      Unirse a la sesión compartida de otro usuario

  Requiere una cuenta de AnvilHub. Consulta el changelog para ver su disponibilidad.
