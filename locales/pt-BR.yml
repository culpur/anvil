cmd.docker.usage: |
  Uso:
    /docker ps                       Listar containers em execução
    /docker logs <container>         Mostrar as últimas 50 linhas dos logs do container
    /docker compose                  Mostrar serviços do docker-compose (se houver)
    /docker build                    Construir imagem a partir do Dockerfile no diretório atual
cmd.docker.logs_usage: "Uso: /docker logs <container>"
cmd.docker.unknown_sub: "Sub-comando docker desconhecido: %{sub}\nRode `/docker help` para ver o uso."

cmd.voice.start: |
  Entrada de voz — em breve

  A captura de voz exige acesso ao microfone e um backend de speech-to-text.
  Planejado: /voice start  ->  capturar o microfone e injetar como prompt.
cmd.voice.stop: |
  Entrada de voz — em breve

  Nenhuma sessão de voz ativa para parar.
cmd.voice.help: |
  Entrada de voz (em breve)

  Comandos:
    /voice start   Começar a capturar o microfone
    /voice stop    Parar a captura e enviar

  Requer um motor local de speech-to-text (ex.: whisper.cpp).
cmd.voice.unknown_sub: "Sub-comando /voice desconhecido: %{sub}\n  /voice start | /voice stop"

cmd.collab.share: |
  Colaboração — em breve

  Planejado: /collab share  ->  gerar um ID de sessão compartilhável.
  Este recurso está reservado para uma versão futura.
cmd.collab.join: |
  Colaboração — em breve

  Uso: /collab join <session-id>
  Este recurso está reservado para uma versão futura.
cmd.collab.help: |
  Colaboração (em breve)

  Comandos:
    /collab share          Compartilhar esta sessão (gera um ID de convite)
    /collab join <id>      Entrar na sessão compartilhada de outro usuário

  Requer uma conta no AnvilHub. Acompanhe o changelog para a disponibilidade.
