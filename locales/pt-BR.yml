  Entrada de voz — em breve

  Nenhuma sessão de voz ativa para parar.
cmd.voice.help: |
  Entrada de voz (em breve)

  Comandos:
    /voice start   Começar a capturar o microfone
    /voice stop    Parar a captura e enviar

  Requer um motor local de speech-to-text (ex.: whisper.cpp).
