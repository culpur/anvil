# ─── 명령어 — voice / collab / docker / k8s / iac / deps ──────────────────
cmd.docker.usage: |
  사용법:
    /docker ps                   실행 중인 컨테이너 목록
    /docker logs <컨테이너>       컨테이너 로그의 마지막 50줄 표시
    /docker compose              docker-compose 서비스 표시 (있는 경우)
    /docker build                현재 디렉터리의 Dockerfile로 이미지 빌드
cmd.docker.logs_usage: "사용법: /docker logs <컨테이너>"
cmd.docker.unknown_sub: "알 수 없는 docker 서브명령: %{sub}\n사용법은 `/docker help`로 확인하세요."

cmd.voice.start: |
  음성 입력 — 곧 제공 예정

  음성 캡처에는 마이크 액세스와 speech-to-text 백엔드가 필요합니다.
  계획: /voice start  ->  마이크 입력을 캡처해 프롬프트로 주입.
cmd.voice.stop: |
  음성 입력 — 곧 제공 예정

  중지할 활성 음성 세션이 없습니다.
cmd.voice.help: |
  음성 입력 (곧 제공 예정)

  명령어:
    /voice start   마이크 입력 캡처 시작
    /voice stop    캡처를 중지하고 전송

  로컬 speech-to-text 엔진이 필요합니다 (예: whisper.cpp).
cmd.voice.unknown_sub: "알 수 없는 /voice 서브명령: %{sub}\n  /voice start | /voice stop"

cmd.collab.share: |
  협업 — 곧 제공 예정

  계획: /collab share  ->  공유 가능한 세션 ID 생성.
  이 기능은 향후 릴리스를 위해 예약되어 있습니다.
cmd.collab.join: |
  협업 — 곧 제공 예정

  사용법: /collab join <session-id>
  이 기능은 향후 릴리스를 위해 예약되어 있습니다.
cmd.collab.help: |
  협업 (곧 제공 예정)

  명령어:
    /collab share          이 세션 공유 (초대 ID 생성)
    /collab join <id>      다른 사용자의 공유 세션에 참여

  AnvilHub 계정이 필요합니다. 사용 가능 시점은 changelog를 확인하세요.
cmd.collab.unknown_sub: "알 수 없는 /collab 서브명령: %{sub}\n  /collab share | /collab join <id>"

cmd.k8s.usage: |
  사용법:
    /k8s pods                   현재 네임스페이스의 파드 목록
    /k8s logs <pod>             파드 로그의 마지막 50줄 표시
    /k8s apply <파일>            kubectl로 매니페스트 적용
    /k8s describe <리소스>       리소스 설명
cmd.k8s.kubectl_missing: "PATH에서 kubectl을 찾을 수 없습니다. 설치: https://kubernetes.io/docs/tasks/tools/"
cmd.k8s.logs_usage: "사용법: /k8s logs <pod>"
cmd.k8s.apply_usage: "사용법: /k8s apply <파일>"
cmd.k8s.describe_usage: "사용법: /k8s describe <리소스>"
cmd.k8s.unknown_sub: "알 수 없는 /k8s 서브명령: %{args}\n사용법은 `/k8s help`로 확인하세요."

cmd.iac.usage: |
  사용법:
    /iac plan       terraform/tofu plan 실행
    /iac apply      terraform/tofu apply 실행
    /iac validate   설정 파일 검증
    /iac drift      인프라 드리프트 감지 (plan -refresh-only)
cmd.iac.tui_modal_required: "/iac apply: TUI 내 확인 모달이 해결되지 않았습니다. 다시 시도하거나 일반 셸에서 `anvil --print /iac apply`를 실행해 CLI 확인 프롬프트를 사용하세요."
cmd.iac.no_terraform: "PATH에서 'tofu' 또는 'terraform'을 찾을 수 없습니다.\nOpenTofu 설치: https://opentofu.org/docs/intro/install/"
cmd.iac.confirm_prompt: "이 작업은 인프라에 변경 사항을 적용합니다. 계속할까요? (y/N) "
cmd.iac.cancelled: "Apply가 취소되었습니다."
cmd.iac.unknown_sub: "알 수 없는 /iac 서브명령: %{sub}\n사용법은 `/iac help`로 확인하세요."
cmd.iac.no_binary_for_apply: "PATH에서 terraform/tofu 바이너리를 찾을 수 없습니다. apply 전에 OpenTofu를 설치하세요."
cmd.iac.confirm_body_with_plan: "이 작업은 인프라에 변경 사항을 적용합니다.\n\n%{plan}\n\n확인 전에 plan을 신중히 검토하세요."
cmd.iac.confirm_body_generic: "이 작업은 인프라에 변경 사항을 적용합니다.\n\n확인 전에 plan을 신중히 검토하세요."

cmd.deps.usage: |
  사용법:
    /deps tree           의존성 트리 표시
    /deps outdated       오래된 의존성 표시
    /deps audit          의존성 보안 감사
