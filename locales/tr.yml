# ─── Komutlar — voice / collab / docker / k8s / iac / deps ────────────────
cmd.docker.usage: |
  Kullanım:
    /docker ps                   Çalışan konteynerleri listele
    /docker logs <konteyner>     Konteyner günlüğünün son 50 satırını göster
    /docker compose              docker-compose servislerini göster (varsa)
    /docker build                Mevcut dizindeki Dockerfile'dan imaj oluştur
cmd.docker.logs_usage: "Kullanım: /docker logs <konteyner>"
cmd.docker.unknown_sub: "Bilinmeyen docker alt-komutu: %{sub}\nKullanım için `/docker help` çalıştırın."

cmd.voice.start: |
  Sesli girdi — yakında

  Ses yakalama mikrofon erişimi ve bir konuşmadan-metne backend gerektirir.
  Planlanan: /voice start  ->  mikrofon girişini yakala ve prompt olarak ekle.
cmd.voice.stop: |
  Sesli girdi — yakında

  Durdurulacak etkin bir ses oturumu yok.
cmd.voice.help: |
  Sesli girdi (yakında)

  Komutlar:
    /voice start   Mikrofon girişini yakalamaya başla
    /voice stop    Yakalamayı durdur ve gönder

  Yerel bir konuşmadan-metne motoru gerektirir (örn. whisper.cpp).
cmd.voice.unknown_sub: "Bilinmeyen /voice alt-komutu: %{sub}\n  /voice start | /voice stop"

cmd.collab.share: |
  İş birliği — yakında

  Planlanan: /collab share  ->  paylaşılabilir bir oturum kimliği oluşturur.
  Bu özellik gelecekteki bir sürüm için ayrılmıştır.
cmd.collab.join: |
  İş birliği — yakında

  Kullanım: /collab join <session-id>
  Bu özellik gelecekteki bir sürüm için ayrılmıştır.
cmd.collab.help: |
  İş birliği (yakında)

  Komutlar:
    /collab share          Bu oturumu paylaş (davet kimliği oluşturur)
    /collab join <id>      Başka bir kullanıcının paylaşılan oturumuna katıl

  Bir AnvilHub hesabı gerektirir. Kullanılabilirlik için changelog'u izleyin.
cmd.collab.unknown_sub: "Bilinmeyen /collab alt-komutu: %{sub}\n  /collab share | /collab join <id>"

cmd.k8s.usage: |
  Kullanım:
    /k8s pods                   Geçerli namespace'teki pod'ları listele
    /k8s logs <pod>             Pod günlüğünün son 50 satırını izle
    /k8s apply <dosya>          kubectl ile bir manifest uygula
    /k8s describe <kaynak>      Bir kaynağı betimle
cmd.k8s.kubectl_missing: "PATH'te kubectl bulunamadı. Şuradan yükleyin: https://kubernetes.io/docs/tasks/tools/"
cmd.k8s.logs_usage: "Kullanım: /k8s logs <pod>"
cmd.k8s.apply_usage: "Kullanım: /k8s apply <dosya>"
cmd.k8s.describe_usage: "Kullanım: /k8s describe <kaynak>"
cmd.k8s.unknown_sub: "Bilinmeyen /k8s alt-komutu: %{args}\nKullanım için `/k8s help` çalıştırın."

cmd.iac.usage: |
  Kullanım:
    /iac plan       terraform/tofu plan çalıştır
    /iac apply      terraform/tofu apply çalıştır
    /iac validate   Yapılandırma dosyalarını doğrula
    /iac drift      Altyapı drift'ini tespit et (plan -refresh-only)
cmd.iac.tui_modal_required: "/iac apply: TUI içi onay modali çözülemedi. Lütfen tekrar deneyin — veya CLI onay sorgusunu kullanmak için normal bir kabukta `anvil --print /iac apply` çalıştırın."
cmd.iac.no_terraform: "PATH'te 'tofu' veya 'terraform' bulunamadı.\nOpenTofu'yu yükleyin: https://opentofu.org/docs/intro/install/"
cmd.iac.confirm_prompt: "Bu işlem altyapınıza değişiklik uygulayacak. Devam edilsin mi? (y/N) "
cmd.iac.cancelled: "Apply iptal edildi."
cmd.iac.unknown_sub: "Bilinmeyen /iac alt-komutu: %{sub}\nKullanım için `/iac help` çalıştırın."
cmd.iac.no_binary_for_apply: "PATH'te terraform/tofu ikilisi bulunamadı. Apply işleminden önce OpenTofu'yu yükleyin."
cmd.iac.confirm_body_with_plan: "Bu işlem altyapınıza değişiklik uygulayacak.\n\n%{plan}\n\nOnaylamadan önce plan'ı dikkatlice inceleyin."
cmd.iac.confirm_body_generic: "Bu işlem altyapınıza değişiklik uygulayacak.\n\nOnaylamadan önce plan'ı dikkatlice inceleyin."

cmd.deps.usage: |
  Kullanım:
    /deps tree           Bağımlılık ağacını göster
    /deps outdated       Güncel olmayan bağımlılıkları göster
    /deps audit          Bağımlılıkların güvenlik denetimi
    /deps why <pkg>      Bir bağımlılığın neden dahil edildiğini açıkla
cmd.deps.no_package_manager: "Tanınan bir paket yöneticisi bulunamadı."

