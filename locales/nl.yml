cmd.docker.usage: |
  Gebruik:
    /docker ps                   Lijst draaiende containers
    /docker logs <container>     Toon laatste 50 regels van containerlogs
    /docker compose              Toon docker-compose services (indien aanwezig)
    /docker build                Bouw image vanuit Dockerfile in huidige directory
