cmd.voice.start: |
  Spraakinvoer — binnenkort beschikbaar

  Spraakopname vereist microfoontoegang en een speech-to-text backend.
  Gepland: /voice start  ->  microfooninvoer opnemen en als prompt injecteren.
cmd.voice.stop: |
  Spraakinvoer — binnenkort beschikbaar

  Geen actieve spraaksessie om te stoppen.
cmd.voice.help: |
  Spraakinvoer (binnenkort beschikbaar)

  Commando's:
    /voice start   Begin met opnemen van microfooninvoer
    /voice stop    Stop opname en verzend

  Vereist een lokale speech-to-text engine (bijv. whisper.cpp).
cmd.voice.unknown_sub: "Onbekend /voice-subcommando: %{sub}\n  /voice start | /voice stop"

cmd.collab.share: |
  Samenwerken — binnenkort beschikbaar

  Gepland: /collab share  ->  een deelbare sessie-ID genereren.
  Deze functie is gereserveerd voor een toekomstige release.
cmd.collab.join: |
  Samenwerken — binnenkort beschikbaar

  Gebruik: /collab join <session-id>
  Deze functie is gereserveerd voor een toekomstige release.
cmd.collab.help: |
  Samenwerken (binnenkort beschikbaar)

  Commando's:
    /collab share          Deel deze sessie (genereert een uitnodigings-ID)
    /collab join <id>      Sluit aan bij de gedeelde sessie van een andere gebruiker

  Vereist een AnvilHub-account. Houd de changelog in de gaten voor beschikbaarheid.
