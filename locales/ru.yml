cmd.voice.start: |
  Голосовой ввод — скоро

  Захват голоса требует доступа к микрофону и speech-to-text бэкенда.
  В планах: /voice start  ->  захватить вход микрофона и подставить как prompt.
cmd.voice.stop: |
  Голосовой ввод — скоро

  Нет активной голосовой сессии для остановки.
cmd.voice.help: |
  Голосовой ввод (скоро)

  Команды:
    /voice start   Начать захват микрофона
    /voice stop    Остановить захват и отправить

  Требуется локальный speech-to-text движок (например, whisper.cpp).
cmd.voice.unknown_sub: "Неизвестная подкоманда /voice: %{sub}\n  /voice start | /voice stop"

cmd.collab.share: |
  Совместная работа — скоро

  В планах: /collab share  ->  сгенерировать общий ID сессии.
  Функция зарезервирована для будущего релиза.
cmd.collab.join: |
  Совместная работа — скоро

  Использование: /collab join <session-id>
  Функция зарезервирована для будущего релиза.
cmd.collab.help: |
  Совместная работа (скоро)

  Команды:
    /collab share          Поделиться этой сессией (генерирует ID приглашения)
    /collab join <id>      Подключиться к чужой общей сессии

  Требуется аккаунт AnvilHub. Следите за changelog, чтобы узнать о доступности.
cmd.collab.unknown_sub: "Неизвестная подкоманда /collab: %{sub}\n  /collab share | /collab join <id>"

