  hub.downloads: "%{count}ダウンロード"
  hub.package_info: "パッケージ: %{name} v%{version} 作者: %{author}"
  hub.package_type: "タイプ: %{type}"
  hub.package_desc: "説明: %{desc}"
  hub.usage_hint: |
    使い方:
      /hub                       カテゴリ別トップパッケージを表示
      /hub search <クエリ>       全パッケージを検索
      /hub skills                トップスキル
      /hub plugins               トッププラグイン
      /hub agents                トップエージェント
      /hub themes                トップテーマ
      /hub install <名前>        パッケージをダウンロードしてインストール
      /hub info <名前>           パッケージの詳細を表示

