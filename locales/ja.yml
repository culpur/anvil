# ─── コマンド — voice / collab / docker / k8s / iac / deps ────────────────
cmd.docker.usage: |
  使い方:
    /docker ps                   稼働中のコンテナを一覧表示
    /docker logs <コンテナ>      コンテナログの最後の 50 行を表示
    /docker compose              docker-compose のサービスを表示（存在する場合）
    /docker build                カレントディレクトリの Dockerfile からイメージをビルド
cmd.docker.logs_usage: "使い方: /docker logs <コンテナ>"
cmd.docker.unknown_sub: "不明な docker サブコマンド: %{sub}\n使い方は `/docker help` を実行してください。"

cmd.voice.start: |
  音声入力 — 近日公開

  音声キャプチャにはマイクへのアクセスと speech-to-text バックエンドが必要です。
  予定: /voice start  ->  マイク入力をキャプチャし prompt として注入。
cmd.voice.stop: |
  音声入力 — 近日公開

  停止できるアクティブな音声セッションはありません。
cmd.voice.help: |
  音声入力（近日公開）

  コマンド:
    /voice start   マイク入力のキャプチャを開始
    /voice stop    キャプチャを停止して送信

  ローカルの speech-to-text エンジン（例: whisper.cpp）が必要です。
cmd.voice.unknown_sub: "不明な /voice サブコマンド: %{sub}\n  /voice start | /voice stop"

cmd.collab.share: |
  コラボレーション — 近日公開

  予定: /collab share  ->  共有可能なセッション ID を生成。
  この機能は将来のリリース向けに予約されています。
cmd.collab.join: |
