  # Hub command messages
  hub.top_packages: "AnvilHubのトップパッケージ"
  hub.search_results: "\"%{query}\"の検索結果"
  hub.no_results: "パッケージが見つかりませんでした。"
  hub.installing: "%{name} %{version}をインストール中..."
