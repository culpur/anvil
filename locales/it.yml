  Input vocale — disponibile presto

  La cattura vocale richiede l'accesso al microfono e un backend speech-to-text.
  Previsto: /voice start  ->  cattura l'input del microfono e lo inietta come prompt.
cmd.voice.stop: |
  Input vocale — disponibile presto

  Nessuna sessione vocale attiva da fermare.
cmd.voice.help: |
  Input vocale (disponibile presto)

  Comandi:
    /voice start   Avvia la cattura dell'input dal microfono
    /voice stop    Ferma la cattura e invia

  Richiede un motore speech-to-text locale (es. whisper.cpp).
