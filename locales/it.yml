  Uso:
    /docker ps                   Elenca i container in esecuzione
    /docker logs <container>     Mostra le ultime 50 righe dei log del container
    /docker compose              Mostra i servizi docker-compose (se presenti)
    /docker build                Crea l'immagine dal Dockerfile nella directory corrente
cmd.docker.logs_usage: "Uso: /docker logs <container>"
cmd.docker.unknown_sub: "Sotto-comando docker sconosciuto: %{sub}\nEsegui `/docker help` per l'uso."

