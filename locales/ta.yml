    /docker ps                   List running containers
    /docker logs <container>     Show last 50 lines of container logs
    /docker compose              Show docker-compose services (if present)
    /docker build                Build image from Dockerfile in current directory
cmd.docker.logs_usage: "Usage: /docker logs <container>"
cmd.docker.unknown_sub: "Unknown docker sub-command: %{sub}\nRun `/docker help` for usage."

cmd.voice.start: |
  Voice input — coming soon

  Voice capture requires microphone access and a speech-to-text backend.
  Planned: /voice start  ->  capture mic input and inject as a prompt.
cmd.voice.stop: |
  Voice input — coming soon

  No active voice session to stop.
cmd.voice.help: |
  Voice input (coming soon)

  Commands:
    /voice start   Begin capturing microphone input
    /voice stop    Stop capturing and submit

  Requires a local speech-to-text engine (e.g. whisper.cpp).
cmd.voice.unknown_sub: "Unknown /voice sub-command: %{sub}\n  /voice start | /voice stop"

cmd.collab.share: |
  Collaboration — coming soon

  Planned: /collab share  ->  generate a shareable session ID.
  This feature is reserved for a future release.
cmd.collab.join: |
  Collaboration — coming soon

  Usage: /collab join <session-id>
  This feature is reserved for a future release.
cmd.collab.help: |
  Collaboration (coming soon)

  Commands:
    /collab share          Share this session (generates an invite ID)
    /collab join <id>      Join another user's shared session

  Requires an AnvilHub account. Watch the changelog for availability.
cmd.collab.unknown_sub: "Unknown /collab sub-command: %{sub}\n  /collab share | /collab join <id>"

cmd.k8s.usage: |
  Usage:
    /k8s pods                   List pods in current namespace
    /k8s logs <pod>             Tail last 50 lines of pod logs
    /k8s apply <file>           Apply a manifest with kubectl
    /k8s describe <resource>    Describe a resource
cmd.k8s.kubectl_missing: "kubectl not found in PATH. Install it from https://kubernetes.io/docs/tasks/tools/"
cmd.k8s.logs_usage: "Usage: /k8s logs <pod>"
cmd.k8s.apply_usage: "Usage: /k8s apply <file>"
cmd.k8s.describe_usage: "Usage: /k8s describe <resource>"
cmd.k8s.unknown_sub: "Unknown /k8s sub-command: %{args}\nRun `/k8s help` for usage."

cmd.iac.usage: |
  Usage:
    /iac plan       Run terraform/tofu plan
    /iac apply      Run terraform/tofu apply
    /iac validate   Validate configuration files
    /iac drift      Detect infrastructure drift (plan -refresh-only)
cmd.iac.tui_modal_required: "/iac apply: in-TUI confirmation modal did not resolve. Please retry — or run `anvil --print /iac apply` from a regular shell to use the CLI confirmation prompt instead."
cmd.iac.no_terraform: "Neither 'tofu' nor 'terraform' found in PATH.\nInstall OpenTofu: https://opentofu.org/docs/intro/install/"
cmd.iac.confirm_prompt: "This will apply changes to your infrastructure. Continue? (y/N) "
cmd.iac.cancelled: "Apply cancelled."
cmd.iac.unknown_sub: "Unknown /iac sub-command: %{sub}\nRun `/iac help` for usage."
cmd.iac.no_binary_for_apply: "No terraform/tofu binary found in PATH. Install OpenTofu before applying."
cmd.iac.confirm_body_with_plan: "This will apply changes to your infrastructure.\n\n%{plan}\n\nReview the plan carefully before confirming."
cmd.iac.confirm_body_generic: "This will apply changes to your infrastructure.\n\nReview the plan carefully before confirming."

cmd.deps.usage: |
  Usage:
    /deps tree           Show dependency tree
    /deps outdated       Show outdated dependencies
    /deps audit          Security audit of dependencies
    /deps why <pkg>      Explain why a dependency is included
cmd.deps.no_package_manager: "No recognised package manager found."

