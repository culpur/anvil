# ─── Lệnh — voice / collab / docker / k8s / iac / deps ────────────────────
cmd.docker.usage: |
  Cách dùng:
    /docker ps                   Liệt kê các container đang chạy
    /docker logs <container>     Hiển thị 50 dòng cuối của log container
    /docker compose              Hiển thị các service docker-compose (nếu có)
    /docker build                Build image từ Dockerfile trong thư mục hiện tại
cmd.docker.logs_usage: "Cách dùng: /docker logs <container>"
cmd.docker.unknown_sub: "Sub-command docker không xác định: %{sub}\nChạy `/docker help` để xem cách dùng."

cmd.voice.start: |
  Đầu vào bằng giọng nói — sắp ra mắt

  Bắt giọng nói yêu cầu truy cập micrô và backend speech-to-text.
  Dự kiến: /voice start  ->  bắt đầu vào từ micrô và đưa vào dưới dạng prompt.
cmd.voice.stop: |
  Đầu vào bằng giọng nói — sắp ra mắt

  Không có phiên giọng nói nào để dừng.
cmd.voice.help: |
  Đầu vào bằng giọng nói (sắp ra mắt)

  Lệnh:
    /voice start   Bắt đầu thu micrô
    /voice stop    Dừng thu và gửi

  Yêu cầu một engine speech-to-text cục bộ (ví dụ whisper.cpp).
cmd.voice.unknown_sub: "Sub-command /voice không xác định: %{sub}\n  /voice start | /voice stop"

cmd.collab.share: |
  Cộng tác — sắp ra mắt

  Dự kiến: /collab share  ->  tạo ID phiên có thể chia sẻ.
  Tính năng này được dành riêng cho một bản phát hành tương lai.
cmd.collab.join: |
  Cộng tác — sắp ra mắt

  Cách dùng: /collab join <session-id>
  Tính năng này được dành riêng cho một bản phát hành tương lai.
cmd.collab.help: |
  Cộng tác (sắp ra mắt)

  Lệnh:
    /collab share          Chia sẻ phiên này (tạo ID mời)
    /collab join <id>      Tham gia phiên chia sẻ của người dùng khác

  Yêu cầu tài khoản AnvilHub. Theo dõi changelog để biết khi nào khả dụng.
cmd.collab.unknown_sub: "Sub-command /collab không xác định: %{sub}\n  /collab share | /collab join <id>"

cmd.k8s.usage: |
  Cách dùng:
    /k8s pods                   Liệt kê pod trong namespace hiện tại
    /k8s logs <pod>             Theo dõi 50 dòng cuối của log pod
    /k8s apply <tệp>            Áp dụng manifest bằng kubectl
    /k8s describe <tài nguyên>  Mô tả một tài nguyên
cmd.k8s.kubectl_missing: "Không tìm thấy kubectl trong PATH. Cài đặt từ https://kubernetes.io/docs/tasks/tools/"
cmd.k8s.logs_usage: "Cách dùng: /k8s logs <pod>"
cmd.k8s.apply_usage: "Cách dùng: /k8s apply <tệp>"
cmd.k8s.describe_usage: "Cách dùng: /k8s describe <tài nguyên>"
cmd.k8s.unknown_sub: "Sub-command /k8s không xác định: %{args}\nChạy `/k8s help` để xem cách dùng."

cmd.iac.usage: |
  Cách dùng:
    /iac plan       Chạy terraform/tofu plan
    /iac apply      Chạy terraform/tofu apply
    /iac validate   Xác thực các tệp cấu hình
    /iac drift      Phát hiện drift hạ tầng (plan -refresh-only)
cmd.iac.tui_modal_required: "/iac apply: modal xác nhận trong TUI không hoàn tất. Vui lòng thử lại — hoặc chạy `anvil --print /iac apply` từ một shell thường để dùng prompt xác nhận CLI."
cmd.iac.no_terraform: "Không tìm thấy 'tofu' hoặc 'terraform' trong PATH.\nCài OpenTofu: https://opentofu.org/docs/intro/install/"
cmd.iac.confirm_prompt: "Hành động này sẽ áp dụng thay đổi lên hạ tầng của bạn. Tiếp tục? (y/N) "
cmd.iac.cancelled: "Đã huỷ apply."
cmd.iac.unknown_sub: "Sub-command /iac không xác định: %{sub}\nChạy `/iac help` để xem cách dùng."
cmd.iac.no_binary_for_apply: "Không tìm thấy tệp nhị phân terraform/tofu trong PATH. Cài OpenTofu trước khi apply."
cmd.iac.confirm_body_with_plan: "Hành động này sẽ áp dụng thay đổi lên hạ tầng của bạn.\n\n%{plan}\n\nXem kỹ plan trước khi xác nhận."
cmd.iac.confirm_body_generic: "Hành động này sẽ áp dụng thay đổi lên hạ tầng của bạn.\n\nXem kỹ plan trước khi xác nhận."

cmd.deps.usage: |
  Cách dùng:
    /deps tree           Hiển thị cây phụ thuộc
    /deps outdated       Hiển thị các phụ thuộc lỗi thời
    /deps audit          Kiểm tra bảo mật của các phụ thuộc
    /deps why <pkg>      Giải thích vì sao một phụ thuộc được đưa vào
cmd.deps.no_package_manager: "Không tìm thấy trình quản lý gói nào được nhận dạng."

