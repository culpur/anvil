en:
  # TUI header / footer
  footer.help: "Tab: complete  Enter: send  Ctrl+C: cancel  Ctrl+D: exit  /help: commands"
  footer.configure: "↑↓: navigate  Enter: select  Esc: back  Ctrl+C: exit"
  header.title: "Anvil"
  header.version: "v%{version}"

  # Status / session
  status.model: "Model"
  status.provider: "Provider"
  status.permission: "Permission mode"
  status.session: "Session"
  status.messages: "Messages"
  status.turns: "Turns"
  status.tokens_used: "Tokens used"

  # Command descriptions (used in /help output)
  cmd.help.summary: "Show available slash commands"
  cmd.status.summary: "Show current session status"
  cmd.compact.summary: "Compact local session history"
  cmd.model.summary: "Show or switch the active model"
  cmd.permissions.summary: "Show or switch the active permission mode"
  cmd.clear.summary: "Start a fresh local session"
  cmd.cost.summary: "Show cumulative token usage for this session"
  cmd.provider.summary: "Show, switch, or list providers and their models"
  cmd.login.summary: "Login or refresh credentials for a provider"
  cmd.resume.summary: "Load a saved session into the REPL"
  cmd.config.summary: "Inspect Anvil config files or merged sections"
  cmd.memory.summary: "Inspect loaded Anvil instruction memory files"
  cmd.init.summary: "Create a starter ANVIL.md for this repo"
  cmd.diff.summary: "Show git diff for current workspace changes"
  cmd.version.summary: "Show CLI version and build information"
  cmd.bughunter.summary: "Inspect the codebase for likely bugs"
  cmd.branch.summary: "List, create, or switch git branches"
  cmd.worktree.summary: "List, add, remove, or prune git worktrees"
  cmd.commit.summary: "Generate a commit message and create a git commit"
  cmd.pr.summary: "Draft or create a pull request from the conversation"
  cmd.issue.summary: "Draft or create a GitHub issue from the conversation"
  cmd.hub.summary: "Browse and install packages from AnvilHub marketplace"
  cmd.language.summary: "Set display language (en, de, es, fr, ja, zh-CN, ru)"

  # Error messages
  error.unknown_command: "Unknown command: /%{name}"
  error.missing_argument: "Missing required argument for /%{cmd}"
  error.not_available_tui: "Command not available in TUI mode."
  error.provider_not_found: "Provider not found: %{name}"
  error.hub_fetch_failed: "Failed to fetch packages from AnvilHub: %{reason}"
  error.hub_install_failed: "Failed to install package '%{name}': %{reason}"
  error.hub_not_found: "Package not found: %{name}"
  error.invalid_language: "Unsupported language '%{lang}'. Available: en, de, es, fr, ja, zh-CN, ru"
  error.config_save_failed: "Failed to save config: %{reason}"

  # Hub command messages
  hub.top_packages: "Top packages on AnvilHub"
  hub.search_results: "Search results for \"%{query}\""
  hub.no_results: "No packages found."
  hub.installing: "Installing %{name} %{version}..."
  hub.installed: "Installed %{name} %{version} to %{path}"
  hub.downloads: "%{count} downloads"
  hub.package_info: "Package: %{name} v%{version} by %{author}"
  hub.package_type: "Type: %{type}"
  hub.package_desc: "Description: %{desc}"
  hub.usage_hint: |
    Usage:
      /hub                     Show top packages by category
      /hub search <query>      Search all packages
      /hub skills              Top skills
      /hub plugins             Top plugins
      /hub agents              Top agents
      /hub themes              Top themes
      /hub install <name>      Download and install a package
      /hub info <name>         Show package details

  # Language command messages
  language.current: "Current language: %{lang}"
  language.changed: "Language set to: %{lang}"
  language.available: "Available languages: en, de, es, fr, ja, zh-CN, ru"
  language.usage: "Usage: /language [en|de|es|fr|ja|zh-CN|ru]"

  # Configure menu labels
  configure.title: "Configure Anvil"
  configure.providers: "Providers"
  configure.models: "Models"
  configure.context: "Context"
  configure.search: "Search"
  configure.permissions: "Permissions"
  configure.display: "Display"
  configure.integrations: "Integrations"
  configure.language: "Language"

  # Login/provider prompts
  login.prompt_provider: "Select provider to login [anthropic/openai/ollama]: "
  login.success: "Login successful for %{provider}."
  login.failed: "Login failed: %{reason}"
  login.enter_api_key: "Enter API key: "
  login.testing_connection: "Testing connection to %{host}..."
  login.connected: "Connected"
  login.connection_failed: "Could not connect"
