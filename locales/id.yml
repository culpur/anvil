  Input suara — segera hadir

  Penangkapan suara memerlukan akses mikrofon dan backend speech-to-text.
  Rencana: /voice start  ->  tangkap input mikrofon dan suntikkan sebagai prompt.
cmd.voice.stop: |
  Input suara — segera hadir

  Tidak ada sesi suara aktif untuk dihentikan.
cmd.voice.help: |
  Input suara (segera hadir)

  Perintah:
    /voice start   Mulai menangkap input dari mikrofon
    /voice stop    Hentikan penangkapan dan kirim

  Memerlukan mesin speech-to-text lokal (mis. whisper.cpp).
