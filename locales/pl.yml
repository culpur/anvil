# ─── Komendy — voice / collab / docker / k8s / iac / deps ─────────────────
cmd.docker.usage: |
  Użycie:
    /docker ps                   Wylistuj uruchomione kontenery
    /docker logs <kontener>      Pokaż ostatnie 50 linii logów kontenera
    /docker compose              Pokaż usługi docker-compose (jeśli są)
    /docker build                Zbuduj obraz z Dockerfile w bieżącym katalogu
cmd.docker.logs_usage: "Użycie: /docker logs <kontener>"
cmd.docker.unknown_sub: "Nieznana subkomenda docker: %{sub}\nUruchom `/docker help`, aby zobaczyć użycie."

cmd.voice.start: |
  Wejście głosowe — wkrótce

  Przechwytywanie głosu wymaga dostępu do mikrofonu i backendu speech-to-text.
  Planowane: /voice start  ->  przechwyć wejście z mikrofonu i wstaw jako prompt.
cmd.voice.stop: |
  Wejście głosowe — wkrótce

  Brak aktywnej sesji głosowej do zatrzymania.
cmd.voice.help: |
  Wejście głosowe (wkrótce)

  Komendy:
    /voice start   Rozpocznij przechwytywanie z mikrofonu
    /voice stop    Zatrzymaj przechwytywanie i wyślij

  Wymaga lokalnego silnika speech-to-text (np. whisper.cpp).
cmd.voice.unknown_sub: "Nieznana subkomenda /voice: %{sub}\n  /voice start | /voice stop"

cmd.collab.share: |
  Współpraca — wkrótce

  Planowane: /collab share  ->  generuje współdzielony identyfikator sesji.
  Ta funkcjonalność jest zarezerwowana dla przyszłej wersji.
cmd.collab.join: |
  Współpraca — wkrótce

  Użycie: /collab join <session-id>
  Ta funkcjonalność jest zarezerwowana dla przyszłej wersji.
cmd.collab.help: |
  Współpraca (wkrótce)

  Komendy:
    /collab share          Udostępnij tę sesję (generuje identyfikator zaproszenia)
    /collab join <id>      Dołącz do udostępnionej sesji innego użytkownika

  Wymaga konta AnvilHub. Sprawdzaj changelog w sprawie dostępności.
